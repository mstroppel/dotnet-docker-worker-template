name: NuGet Publish

on:
  release:
    types:
      - published

jobs:
  pack-and-publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack template
        run: |
          dotnet pack Rafatz.DotnetDockerWorker.csproj \
            --configuration Release \
            /p:Version=${{ github.event.release.tag_name }} \
            --output ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
