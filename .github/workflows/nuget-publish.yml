name: NuGet Publish

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  pack-validation:
    name: Validate NuGet Pack
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack template
        run: |
          dotnet pack Rafatz.DotnetDockerWorker.csproj \
            --configuration Release \
            --output ./nupkg

  pack-and-publish:
    name: Pack & Publish to NuGet.org
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack template
        run: |
          dotnet pack Rafatz.DotnetDockerWorker.csproj \
            --configuration Release \
            /p:Version=${{ github.event.release.tag_name }} \
            --output ./nupkg

      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
